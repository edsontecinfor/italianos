<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota de Pedido - Italianos</title>

<style>
*{box-sizing:border-box}

@page{size:80mm auto;margin:2mm}

body{
margin:0;
background:#f3f4f6;
color:#111;
font-family:"Courier New",monospace;
font-size:11px;
}

.page{
width:80mm;
margin:auto;
}

.sheet{
background:#fff;
padding:8px;
border:1px solid #ddd;
}

.header{
text-align:center;
border-bottom:1px dashed #000;
padding-bottom:6px;
margin-bottom:6px;
}

.brand-name{
font-size:13px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

.subtitle{
font-size:9px;
}

.meta{
margin-top:5px;
font-size:9px;
text-align:left;
}

.meta-row{
display:flex;
justify-content:space-between;
}

.section{
border-bottom:1px dashed #000;
padding:6px 0;
}

.section h3{
margin:4px 0;
font-size:11px;
}

.row{
display:grid;
grid-template-columns:75px 1fr;
padding:1px 0;
}

.label{font-weight:700}

.footer{
text-align:center;
font-size:9px;
padding-top:6px;
}

.footer-actions{
text-align:center;
margin-top:8px;
}

button{
padding:6px 10px;
cursor:pointer;
}

@media print{
.footer-actions{display:none}
body{background:#fff}
.sheet{border:0;padding:0}
}
</style>
</head>

<body>
<div class="page">
<div class="sheet">

<div class="header">
<div class="brand-name">ITALIANOS</div>
<div class="subtitle">Comprovante de pedido</div>

<div class="meta">
<div class="meta-row"><strong>Pedido:</strong><span id="view_numero_pedido">IT-0001</span></div>
<div class="meta-row"><strong>Data:</strong><span id="view_datahora">-</span></div>
</div>
</div>

<div class="section">
<h3>Cliente</h3>

<div class="row"><div class="label">Nome</div><div id="view_nome">-</div></div>
<div class="row"><div class="label">Telefone</div><div id="view_telefone">-</div></div>
<div class="row"><div class="label">Entrega</div><div id="view_entrega">-</div></div>
<div class="row"><div class="label">Bairro</div><div id="view_bairro">-</div></div>
<div class="row"><div class="label">Endereço</div><div id="view_endereco">-</div></div>

</div>

<div class="section">
<h3>Pedido</h3>
<div id="view_pedido">-</div>
</div>

<div class="footer">
<div>Uso interno do ITALIANOS</div>
</div>

<div class="footer-actions">
<button onclick="window.print()">Imprimir</button>
</div>

</div>
</div>

function gerarNumeroPedido(){
let c=parseInt(localStorage.getItem('it_counter')||'0');
c++;
localStorage.setItem('it_counter',c);
return 'IT-'+String(c).padStart(4,'0');
}

const p=new URLSearchParams(window.location.search);

pedido:p.get('pedido')||''
};
}
